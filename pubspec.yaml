name: asmr_coloring_app
description: ASMR Coloring Book App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  audioplayers: ^5.2.1
  flutter_svg: ^2.0.9
  path_drawing: ^1.0.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/app_content.json
    - assets/data/realistic_content_pack.json
    - assets/references/
    - assets/images/
    - assets/json/
    - assets/sounds/
    - assets/audio/
